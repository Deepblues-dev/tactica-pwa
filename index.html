<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Táctica Abogados | Gestión</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0D1B2A">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy: #0D1B2A; --gold: #C5A059; }
        body { background: #f4f4f4; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: var(--navy); border-bottom: 3px solid var(--gold); color: white; }
        .card-legal { border: none; border-left: 5px solid var(--gold); border-radius: 8px; margin-bottom: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-gold { background: var(--gold); color: white; border: none; font-weight: bold; }
        .btn-gold:hover { background: #b08d4a; color: white; }
    </style>
</head>
<body>

<nav class="navbar p-3 shadow">
    <span class="fw-bold">TÁCTICA ABOGADOS</span>
    <button id="login_btn" class="btn btn-sm btn-gold" onclick="iniciarSesion()">INGRESAR</button>
</nav>

<div class="container mt-4" id="lista-expedientes">
    <div class="text-center p-5">
        <p class="text-muted">Esperando autenticación de Google...</p>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" onload="initGis()"></script>

<script>
    const CLIENT_ID = '453700019777-2orvn3rdbepvhq8rdjdi26i548s0t3nq.apps.googleusercontent.com'; 
    const SHEET_ID = '1Kxx-zjhGIsF3mnAKs6_e3yZCEHGyauufQ90wzlL2InA';
    let tokenClient;

    function initGis() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
            callback: (tokenResponse) => {
                if (tokenResponse.access_token) {
                    consultarDatos(tokenResponse.access_token);
                }
            },
        });
    }

    function iniciarSesion() {
        tokenClient.requestAccessToken();
    }

    async function consultarDatos(token) {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/DB!A:Z`;
        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        renderizar(data.values);
    }

    function renderizar(filas) {
        const contenedor = document.getElementById('lista-expedientes');
        contenedor.innerHTML = '';
        if (!filas) return;

        filas.slice(1).forEach(fila => {
            contenedor.innerHTML += `
                <div class="card card-legal p-3">
                    <div class="d-flex justify-content-between small text-muted">
                        <span>EXP: ${fila[1]}</span>
                        <span class="text-gold fw-bold">${fila[21] || 'PENDIENTE'}</span>
                    </div>
                    <div class="h6 mt-2 mb-1">${fila[5]} vs ${fila[6]}</div>
                    <div class="small text-secondary">${fila[3]}</div>
                </div>
            `;
        });
        document.getElementById('login_btn').innerText = "CONECTADO";
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
