<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Táctica Abogados | Gestión</title>
  <meta name="theme-color" content="#0D1B2A">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.png">  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    :root { --navy: #0D1B2A; --gold: #C5A059; --white: #FFFFFF; }
    body { background-color: #F8F9FA; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
    
    #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--navy); color: white; z-index: 3000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center;
    }

    .nav-app { background: var(--navy); color: var(--white); padding: 8px 0; border-bottom: 3px solid var(--gold); }
    .logo-img { height: 45px; width: auto; object-fit: contain; }
    
    .logo-splash { height: 120px; width: auto; margin-bottom: 5px; } 

    .search-section { background: white; padding: 15px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
    
    .card-exp { 
      border: none; border-top: 4px solid var(--gold); 
      border-radius: 8px; background: var(--white);
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; padding: 15px;
    }
    .btn-edit { color: var(--gold); cursor: pointer; border: none; background: none; }

    .filter-options { font-size: 0.85rem; margin-top: 10px; color: #444; }
    .sub-filter-box { 
        display: none; padding: 10px; margin-top: 10px; 
        background: #f1f3f5; border-radius: 8px; 
    }

    /* Botón Logout */
    .btn-logout {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.3);
        color: rgba(255,255,255,0.8);
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 4px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .btn-logout:hover { border-color: var(--gold); color: var(--gold); }
    
    #loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:2000; padding-top:200px; text-align:center; }
  </style>
</head>
<body>

<div id="splash-screen">
    <img src="logo.png" class="logo-splash" alt="Logo Táctica">
    <h3 class="fw-bold mb-1">TÁCTICA ABOGADOS</h3>
    <p class="mb-4 opacity-75">Gestión de expedientes</p>
    <button class="btn btn-lg btn-outline-light px-5" onclick="iniciarSesion()" style="border-radius: 30px;">INGRESAR AL SISTEMA</button>
</div>

<div id="loading-overlay">
    <div class="spinner-border text-warning"></div>
    <p class="mt-2 fw-bold">Actualizando base de datos...</p>
</div>
