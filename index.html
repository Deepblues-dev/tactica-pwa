<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Táctica Abogados | Gestión</title>
  
  <meta name="theme-color" content="#0D1B2A">
  <meta name="mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  
  <link rel="apple-touch-icon" href="logold.png"> <link rel="icon" type="image/png" sizes="192x192" href="logold.png"> <link rel="icon" type="image/png" sizes="32x32" href="logold.png"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    :root { --navy: #0D1B2A; --gold: #C5A059; --white: #FFFFFF; }
    body { background-color: #F8F9FA; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
    
    #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--navy); color: white; z-index: 3000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center;
    }

    .nav-app { background: var(--navy); color: var(--white); padding: 8px 0; border-bottom: 3px solid var(--gold); }
    .logo-img { height: 45px; width: auto; object-fit: contain; }
    .logo-splash { height: 120px; width: auto; margin-bottom: 5px; } 

    .search-section { background: white; padding: 15px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
    
    .card-exp { 
      border: none; border-top: 4px solid var(--gold); 
      border-radius: 8px; background: var(--white);
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; padding: 15px;
    }
    .btn-edit { color: var(--gold); cursor: pointer; border: none; background: none; }

    .filter-options { font-size: 0.85rem; margin-top: 10px; color: #444; }
    .sub-filter-box { 
        display: none; padding: 10px; margin-top: 10px; 
        background: #f1f3f5; border-radius: 8px; 
    }

    .btn-logout {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.3);
        color: rgba(255,255,255,0.8);
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 4px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .btn-logout:hover { border-color: var(--gold); color: var(--gold); }
    
    #loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:2000; padding-top:200px; text-align:center; }
  </style>
</head>
<body>

<div id="splash-screen">
    <img src="logold.png" class="logo-splash" alt="Logo Táctica">
    <h3 class="fw-bold mb-1">TÁCTICA ABOGADOS</h3>
    <p class="mb-4 opacity-75">Gestión de expedientes</p>
    <button class="btn btn-lg btn-outline-light px-5" onclick="iniciarSesion()" style="border-radius: 30px;">INGRESAR AL SISTEMA</button>
</div>

<div id="loading-overlay">
    <div class="spinner-border text-warning"></div>
    <p class="mt-2 fw-bold">Actualizando base de datos...</p>
</div>

<nav class="nav-app shadow-sm">
  <div class="container d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
        <div class="fw-bold" style="font-size: 0.9rem; letter-spacing: 1px;">GESTIÓN INTERNA</div>
        <button class="btn-logout" id="btn-logout-nav" style="display:none;" onclick="cerrarSesion()">
            <span class="material-symbols-outlined" style="font-size: 14px;">logout</span> Salir
        </button>
    </div>
    <img src="logold.png" class="logo-img" alt="Logo">
  </div>
</nav>

<div class="search-section shadow-sm" id="search-bar" style="display:none;">
    <div class="container">
        <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><span class="material-symbols-outlined text-muted">search</span></span>
            <input type="text" id="global-search" class="form-control border-start-0" placeholder="Búsqueda global..." onkeyup="aplicarFiltros()">
            <button class="btn btn-outline-secondary border-start-0" type="button" onclick="resetearBusquedas()">
                <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 18px;">refresh</span>
            </button>
        </div>

        <div class="filter-options d-flex gap-3 mt-2">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="check-cliente" onchange="toggleFiltro('cliente')">
                <label class="form-check-label" for="check-cliente">Cliente</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="check-organo" onchange="toggleFiltro('organo')">
                <label class="form-check-label" for="check-organo">Órgano Jurisdiccional</label>
            </div>
        </div>

        <div id="box-cliente" class="sub-filter-box">
            <input type="text" id="input-cliente" class="form-control form-control-sm" placeholder="Nombre del Cliente..." onkeyup="aplicarFiltros()">
        </div>

        <div id="box-organo" class="sub-filter-box">
            <div class="btn-group w-100 mb-2" role="group">
                <input type="radio" class="btn-check" name="fuero" id="federal" value="Federal" onchange="aplicarFiltros()">
                <label class="btn btn-sm btn-outline-navy" for="federal">Federal</label>
                <input type="radio" class="btn-check" name="fuero" id="local" value="Local" onchange="aplicarFiltros()">
                <label class="btn btn-sm btn-outline-navy" for="local">Local</label>
            </div>
            <input type="text" id="input-ciudad" class="form-control form-control-sm" placeholder="Ciudad o Distrito Judicial..." list="ciudades-list" onkeyup="aplicarFiltros()">
            <datalist id="ciudades-list"></datalist>
        </div>
    </div>
</div>

<div class="container mt-3">
    <div id="lista-expedientes"></div>
</div>

<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white" style="border-bottom: 2px solid var(--gold);">
        <h5 class="modal-title">Actualizar Expediente</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="form-edicion">
            <input type="hidden" id="edit-row-index">
            <div class="mb-3">
                <label class="form-label small fw-bold">AVANCE / ESTADO PROCESAL</label>
                <textarea id="edit-obs" class="form-control" rows="5"></textarea>
            </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-dark" onclick="guardarCambios()" style="background: var(--navy);">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const CLIENT_ID = '453700019777-2orvn3rdbepvhq8rdjdi26i548s0t3nq.apps.googleusercontent.com'; 
  const SHEET_ID = '1Kxx-zjhGIsF3mnAKs6_e3yZCEHGyauufQ90wzlL2InA';
  let tokenClient, accessToken, rawData = [];

  function normalizar(texto) {
      if (!texto) return "";
      return texto.toString().toLowerCase()
          .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]/g, "");
  }

  function initGis() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/spreadsheets',
        callback: (tokenResponse) => {
            if (tokenResponse.access_token) {
                accessToken = tokenResponse.access_token;
                localStorage.setItem('tactica_token', accessToken);
                localStorage.setItem('tactica_expiry', Date.now() + 3500000);
                entrarApp();
            }
        },
    });

    const savedToken = localStorage.getItem('tactica_token');
    const expiry = localStorage.getItem('tactica_expiry');
    if (savedToken && Date.now() < expiry) {
        accessToken = savedToken;
        entrarApp();
    }
  }

  function entrarApp() {
    document.getElementById('splash-screen').style.display = 'none';
    document.getElementById('search-bar').style.display = 'block';
    document.getElementById('btn-logout-nav').style.display = 'flex';
    consultarDatos();
  }

  function iniciarSesion() { tokenClient.requestAccessToken(); }

  function cerrarSesion() {
      localStorage.clear();
      location.reload();
  }

  async function consultarDatos() {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/DB!A:Z`;
    try {
        const response = await fetch(url, { headers: { 'Authorization': 'Bearer ' + accessToken } });
        const data = await response.json();
        if (data.values) {
            rawData = data.values;
            poblarCiudades();
            renderCards(rawData.slice(1));
        } else if (data.error && data.error.status === "UNAUTHENTICATED") {
            cerrarSesion();
        }
    } catch (e) { console.error(e); }
  }

  function poblarCiudades() {
    const ciudades = [...new Set(rawData.slice(1).map(f => f[13]))].filter(Boolean);
    const dl = document.getElementById('ciudades-list');
    if(dl) dl.innerHTML = ciudades.map(c => `<option value="${c}">`).join('');
  }

  function toggleFiltro(tipo) {
      const isChecked = document.getElementById(`check-${tipo}`).checked;
      document.getElementById(`box-${tipo}`).style.display = isChecked ? 'block' : 'none';
      if (!isChecked) {
          if (tipo === 'cliente') document.getElementById('input-cliente').value = '';
          if (tipo === 'organo') {
              document.getElementById('federal').checked = false;
              document.getElementById('local').checked = false;
              document.getElementById('input-ciudad').value = '';
          }
      }
      aplicarFiltros();
  }

  function aplicarFiltros() {
    const termGlobal = normalizar(document.getElementById('global-search').value);
    const checkCliente = document.getElementById('check-cliente').checked;
    const termCliente = normalizar(document.getElementById('input-cliente').value);
    const checkOrgano
